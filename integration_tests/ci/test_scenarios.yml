schema_variable_name: "pinterest_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: true

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "pin promotion targeting disabled"
    vars:
      ad_reporting__url_report__using_null_filter: false
      pinterest__using_pin_promotion_targeting_report: false
      pinterest__using_targeting_geo_region: false
    include_incremental: false

  - name: "targeting geo disabled"
    vars:
      ad_reporting__url_report__using_null_filter: false
      pinterest__using_pin_promotion_targeting_report: false
      pinterest__using_targeting_geo: false
    include_incremental: false